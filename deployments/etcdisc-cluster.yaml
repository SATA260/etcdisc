app:
  name: etcdisc
  env: dev
http:
  host: 0.0.0.0
  port: 8080
grpc:
  host: 0.0.0.0
  port: 9090
etcd:
  endpoints:
    - 127.0.0.1:2379
  dialMS: 3000
cluster:
  enabled: true
  nodeId: etcdisc-node-1
  advertiseHTTPAddr: 127.0.0.1:8080
  advertiseGRPCAddr: 127.0.0.1:9090
  memberTTLSeconds: 30
  memberKeepAliveSeconds: 10
  leaderTTLSeconds: 30
  leaderKeepAliveSeconds: 10
admin:
  token: change-me-in-dev
