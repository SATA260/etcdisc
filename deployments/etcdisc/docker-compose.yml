version: "3.9"

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.7
    command:
      - /usr/local/bin/etcd
      - --name=etcd0
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
    ports:
      - "2379:2379"

  etcdisc-server:
    build:
      context: ../..
      dockerfile: deployments/Dockerfile
    depends_on:
      - etcd
    environment:
      ETCDISC_ETCD_ENDPOINTS: etcd:2379
      ETCDISC_HTTP_HOST: 0.0.0.0
      ETCDISC_HTTP_PORT: "8080"
      ETCDISC_GRPC_HOST: 0.0.0.0
      ETCDISC_GRPC_PORT: "9090"
    ports:
      - "8080:8080"
      - "9090:9090"
